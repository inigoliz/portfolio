name: Deploy Portfolio to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.156.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb          
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Set Hugo root
        id: hugo-root
        run: |
          if [ -f hugo.yaml ] || [ -f hugo.toml ] || [ -f hugo.json ]; then
            echo "root=." >> $GITHUB_OUTPUT
          elif [ -f portfolio/hugo.yaml ] || [ -f portfolio/hugo.toml ] || [ -f portfolio/hugo.json ]; then
            echo "root=portfolio" >> $GITHUB_OUTPUT
          else
            echo "Could not find Hugo config (hugo.yaml/toml/json)" && exit 1
          fi
      - name: Install Node.js dependencies
        run: "[[ -f ${{ steps.hugo-root.outputs.root }}/package-lock.json || -f ${{ steps.hugo-root.outputs.root }}/npm-shrinkwrap.json ]] && (cd ${{ steps.hugo-root.outputs.root }} && npm ci) || true"
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Los_Angeles
        run: |
          cd ${{ steps.hugo-root.outputs.root }}
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.hugo-root.outputs.root }}/public

  deploy:
    name: Publish
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

