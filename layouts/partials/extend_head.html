{{- if .IsHome }}
<style>
  /* Mold sits behind site chrome; header/main/footer stack above (see below). */
  #p5-landing-wrap {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    z-index: 0;
    pointer-events: none;
    background: #1d1e20;
  }

  body.list > header.header,
  body.list > main.main {
    position: relative;
    z-index: 2;
  }

  /*
   * Frosted panels: match page theme, blur slime behind so motion reads as a light trace
   * and typography stays readable (main sits above the canvas but was visually transparent).
   */
  body.list > header.header {
    background: color-mix(in srgb, var(--theme) 88%, transparent);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
  }

  /* Stack: circular frost (photo) + rectangular frost (copy + links + button). */
  body.list .main .profile .profile_inner--split {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    max-width: min(36rem, 100%);
    padding: 0;
    margin-inline: auto;
    text-align: center;
    background: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  body.list .main .profile .profile_frost_avatar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(0.1rem, 0.35vw, 0.2rem);
    box-sizing: border-box;
    width: min(calc(250px + 0.45rem), min(88vw, 16.25rem));
    height: min(calc(250px + 0.45rem), min(88vw, 16.25rem));
    aspect-ratio: 1;
    border-radius: 50%;
    background: color-mix(in srgb, var(--theme) 78%, transparent);
    backdrop-filter: blur(18px) saturate(1.12);
    -webkit-backdrop-filter: blur(18px) saturate(1.12);
  }

  body.list .main .profile .profile_frost_avatar img {
    width: min(250px, 92%) !important;
    height: auto !important;
    max-width: 100%;
    border-radius: 50%;
    display: block;
  }

  body.list .main .profile .profile_frost_body {
    width: 100%;
    max-width: min(22rem, 100%);
    padding: 0.85rem 1rem 1rem;
    box-sizing: border-box;
    border-radius: calc(var(--radius) + 2px);
    background: color-mix(in srgb, var(--theme) 78%, transparent);
    backdrop-filter: blur(18px) saturate(1.12);
    -webkit-backdrop-filter: blur(18px) saturate(1.12);
  }

  /* Hide footer (copyright / year / “Powered by”) on home only. */
  body.list > footer.footer {
    display: none !important;
  }

  #p5-landing-sketch {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #p5-landing-wrap.is-active #p5-landing-sketch {
    pointer-events: auto;
  }

  #p5-landing-sketch canvas {
    display: block;
  }

  .mushroom-btn {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    z-index: 15;
    pointer-events: auto;
    touch-action: manipulation;
    width: 4.5rem;
    height: 4.5rem;
    padding: 0.35rem;
    border: 2px solid rgba(0, 0, 0, 0.12);
    border-radius: 50%;
    cursor: pointer;
    background: linear-gradient(165deg, #faf7f2 0%, #e8dfd4 100%);
    box-shadow: 0 0.2rem 0.55rem rgba(0, 0, 0, 0.22);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .mushroom-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0.3rem 0.75rem rgba(0, 0, 0, 0.28);
  }

  .mushroom-btn:active {
    transform: scale(0.96);
  }

  .mushroom-btn .slime-mold-launch-icon {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  @media (prefers-reduced-motion: reduce) {
    .mushroom-btn {
      display: none;
    }
  }
</style>
{{- end }}
